<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthCheck - Prediksi Risiko Kanker Paru-Paru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
      }
      .form-select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 0.75rem center;
        background-size: 1.5em 1.5em;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
      }
      .risk-level-high {
        color: #dc2626;
      }
      .risk-level-low {
        color: #16a34a;
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #000000;
        border-top: 4px solid #000000;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .tooltip-container {
        position: relative;
        display: inline-block;
      }
      .tooltip-icon {
        cursor: pointer;
        color: #94a3b8;
      }
      .tooltip-text {
        visibility: hidden;
        width: 220px;
        background-color: #1e293b;
        color: #fff;
        text-align: center;
        border-radius: 6px;
        padding: 8px;
        position: absolute;
        z-index: 10;
        bottom: 125%;
        left: 50%;
        margin-left: -110px;
        opacity: 0;
        transition: opacity 0.3s;
        font-size: 12px;
        font-weight: 500;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }
      .tooltip-text::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        margin-left: -5px;
        border-width: 5px;
        border-style: solid;
        border-color: #1e293b transparent transparent transparent;
      }
      .tooltip-container:hover .tooltip-text {
        visibility: visible;
        opacity: 1;
      }
      #map {
        height: 400px;
        border-radius: 0.5rem;
        margin-top: 1rem;
        background-color: #f7efef;
      }
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s ease-out;
      }
      #splash-video {
        position: absolute;
        top: 0%;
        left: 0%;
        width: 34%;
        height: 100%;
        object-fit: cover;
      }
      .splash-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
      }
      .splash-content {
        position: relative;
        text-align: center;
        z-index: 10;
        background-color: rgba(140, 135, 135, 0.8);
        padding: 2.5rem 3rem;
        border-radius: 1rem;
        color: rgb(0, 0, 0);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(153, 149, 149, 0.1);
      }
    </style>
  </head>
  <body class="text-slate-800">
    <div id="splash-screen">
      <video
        autoplay
        loop
        muted
        playsinline
        id="splash-video"
        src="static/lungs1.mp4"
        onerror="this.style.display='none'"
      ></video>
      <div class="splash-overlay"></div>
      <div class="splash-content">
        <h1 class="text-3xl md:text-4xl font-bold mb-4">
          "Penilaian Risiko Penyakit Paru-Paru"
        </h1>
        <p class="text-lg text-slate-300 mb-8 max-w-md mx-auto">
          Evaluasi kesehatan paru-paru berdasarkan gejala dan riwayat kesehatan
          Anda.
        </p>
        <button
          id="start-assessment-btn"
          class="bg-blue-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-blue-700 transition-all text-lg"
        >
          Mulai Penilaian
        </button>
      </div>
    </div>

    <main class="container mx-auto px-4 py-8 hidden" id="main-content">

      
        <div class="bg-slate-800 p-6 md:p-8 rounded-2xl shadow-lg border border-slate-700">
        <div class="max-w-3xl mx-auto space-y-6">
        <div
          class="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-slate-700"
        >
          <h2 class="text-2xl md:text-3xl font-bold mb-2 text-slate-800">
            Formulir Prediksi Risiko Kanker Paru-Paru
          </h2>
          <p class="text-slate-800 mb-8">
            Harap isi semua pertanyaan di bawah ini dengan jujur.
          </p>
          <form
            id="riskForm"
            class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6"
          ></form>
          <div
            id="error-message"
            class="hidden mt-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg"
          ></div>
          <div class="mt-8 flex gap-4">
            <button
              type="submit"
              form="riskForm"
              class="flex-1 bg-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-700 transition-all"
            >
              Analisis Risiko
            </button>
            <button
              type="button"
              id="resetBtn"
              class="flex-1 bg-slate-200 text-slate-700 font-bold py-3 px-6 rounded-lg hover:bg-slate-300 transition-all"
            >
              Reset Formulir
            </button>
          </div>
        </div>

        <div id="loading" class="hidden text-center p-8">
          <div class="loading-spinner mx-auto"></div>
          <p class="text-blue-600 font-semibold mt-4">Menganalisis...</p>
        </div>

        <div id="results-wrapper" class="hidden space-y-6">
          <!-- Hasil, Peta, dan Tips akan dimasukkan di sini secara dinamis -->
        </div>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const splashScreen = document.getElementById("splash-screen");
        const startBtn = document.getElementById("start-assessment-btn");
        const mainContent = document.getElementById("main-content");
        const form = document.getElementById("riskForm");
        const loadingEl = document.getElementById("loading");
        const resultsWrapper = document.getElementById("results-wrapper");
        const resetBtn = document.getElementById("resetBtn");
        const errorEl = document.getElementById("error-message");

        // Variabel untuk peta, dibuat global agar bisa diakses
        let map = null;
        let markersLayer = null;

        async function buildForm() {
          try {
            const response = await fetch("/features_config.json");
            if (!response.ok) {
              throw new Error(
                "Gagal memuat konfigurasi formulir. Pastikan file features_config.json ada di folder utama."
              );
            }
            const questions = await response.json();

            form.innerHTML = "";

            questions.forEach((q) => {
              const div = document.createElement("div");
              const labelContainer = document.createElement("div");
              labelContainer.className =
                "flex items-center justify-between mb-2";

              const label = document.createElement("label");
              label.htmlFor = q.id;
              label.className = "block text-sm font-medium text-slate-700";
              label.textContent = q.label;

              const tooltipContainer = document.createElement("div");
              tooltipContainer.className = "tooltip-container";
              tooltipContainer.innerHTML = `<svg class="w-5 h-5 tooltip-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" /></svg><div class="tooltip-text">${q.description}</div>`;

              labelContainer.appendChild(label);
              labelContainer.appendChild(tooltipContainer);
              div.appendChild(labelContainer);

              if (q.type === "number") {
                const input = document.createElement("input");
                input.type = "number";
                input.id = q.id;
                input.name = q.id;
                input.className =
                  "w-full p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500";
                input.placeholder = q.placeholder;
                input.required = true;
                div.appendChild(input);
              } else {
                const select = document.createElement("select");
                select.id = q.id;
                select.name = q.id;
                select.className =
                  "w-full p-2.5 border border-slate-300 rounded-md form-select focus:ring-2 focus:ring-blue-500";
                for (const [text, value] of Object.entries(q.options)) {
                  const option = document.createElement("option");
                  option.value = value;
                  option.textContent = text;
                  select.appendChild(option);
                }
                div.appendChild(select);
              }
              form.appendChild(div);
            });
          } catch (error) {
            errorEl.textContent = `Error Kritis: ${error.message}`;
            errorEl.classList.remove("hidden");
          }
        }

        buildForm();

        startBtn.addEventListener("click", () => {
          splashScreen.style.opacity = "0";
          setTimeout(() => {
            splashScreen.style.display = "none";
            mainContent.classList.remove("hidden");
          }, 500);
        });

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          loadingEl.style.display = "block";
          resultsWrapper.style.display = "none";
          errorEl.classList.add("hidden");

          const formData = new FormData(form);
          const data = Object.fromEntries(formData.entries());

          try {
            const response = await fetch("/api/analyze", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });
            const result = await response.json();
            if (!response.ok || result.error) {
              throw new Error(result.error || "Terjadi kesalahan pada server.");
            }
            displayResults(result);
          } catch (error) {
            errorEl.textContent = `Gagal terhubung ke server. Pastikan server Python (main_lung_app.py) sudah berjalan dan coba lagi. Error: ${error.message}`;
            errorEl.classList.remove("hidden");
          } finally {
            loadingEl.style.display = "none";
          }
        });

        resetBtn.addEventListener("click", () => {
          form.reset();
          resultsWrapper.style.display = "none";
          errorEl.classList.add("hidden");
        });

        // --- [DIUBAH] Fungsi untuk menampilkan semua hasil secara dinamis ---
        function displayResults(data) {
          if (map !== null) {
            map.remove();
            map = null;
            markersLayer = null;
          }

          const riskColorClass =
            data.riskLevel === "Berisiko Tinggi"
              ? "risk-level-high"
              : "risk-level-low";
          const numericScore = parseInt(data.riskScore.replace("%", ""));

          let mapCardHTML = "";
          // Tampilkan kartu peta hanya jika skor risiko > 50%
          if (numericScore > 50) {
            mapCardHTML = `
              <div id="map-card" class="bg-white p-8 rounded-2xl shadow-lg border border-gray-200">
                <h3 class="font-bold text-lg mb-2 text-red-600">Peta Fasilitas Kesehatan Terdekat</h3>
                <p class="text-slate-600 mb-4">Karena risiko Anda tinggi, pertimbangkan untuk mengunjungi salah satu lokasi ini untuk konsultasi lebih lanjut.</p>
                <button id="find-hospitals-btn" class="w-full bg-red-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-700 transition-all">
                  Cari Rumah Sakit & Klinik Terdekat
                </button>
                <div id="map-status" class="text-center text-slate-500 mt-4 hidden"></div>
                <div id="map"></div>
              </div>
            `;
          }

          const tipsCardHTML = `
            <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-200">
              <h3 class="font-bold text-lg mb-2">Tips Umum Menjaga Kesehatan Paru-Paru</h3>
              <ul class="list-disc list-inside space-y-2 text-slate-600 mt-4">
                <li><b>Berhenti Merokok:</b> Ini adalah langkah terpenting untuk mengurangi risiko. Hindari juga menjadi perokok pasif.</li>
                <li><b>Olahraga Rutin:</b> Aktivitas fisik seperti berjalan kaki atau bersepeda minimal 30 menit setiap hari.</li>
                <li><b>Pola Makan Sehat:</b> Konsumsi buah, sayuran, dan makanan kaya antioksidan untuk melawan peradangan.</li>
                <li><b>Hindari Polusi Udara:</b> Gunakan masker saat kualitas udara buruk dan gunakan pembersih udara di dalam ruangan jika memungkinkan.</li>
                <li><b>Vaksinasi Teratur:</b> Dapatkan vaksin flu dan pneumonia untuk mencegah infeksi yang dapat merusak paru-paru.</li>
                <li><b>Latihan Pernapasan Dalam:</b> Praktikkan teknik pernapasan diafragma untuk meningkatkan kapasitas dan fungsi paru-paru.</li>
              </ul>
            </div>
          `;

          const resultsCardHTML = `
            <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-200">
              <h2 class="text-2xl font-bold mb-4 text-center">Hasil Analisis Anda</h2>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-center">
                <div>
                  <p class="text-lg text-slate-600">Tingkat Risiko</p>
                  <p class="text-5xl font-bold ${riskColorClass}">${data.riskLevel}</p>
                </div>
                <div>
                  <p class="text-lg text-slate-600">Skor Persentase Risiko</p>
                  <p class="text-5xl font-bold ${riskColorClass}">${data.riskScore}</p>
                </div>
              </div>
              <div class="mt-6 border-t pt-6">
                <h3 class="font-bold text-lg mb-2">Saran</h3>
                <p class="text-slate-600">${data.suggestions}</p>
              </div>
            </div>
          `;

          // Gabungkan semua kartu menjadi satu blok HTML
          resultsWrapper.innerHTML =
            resultsCardHTML + mapCardHTML + tipsCardHTML;
          resultsWrapper.style.display = "block";
          resultsWrapper.scrollIntoView({ behavior: "smooth", block: "start" });

          // Jika kartu peta ada, tambahkan event listener ke tombolnya
          if (numericScore > 50) {
            const findHospitalsBtn =
              document.getElementById("find-hospitals-btn");
            if (findHospitalsBtn) {
              findHospitalsBtn.addEventListener(
                "click",
                handleFindHospitalsClick
              );
            }
          }
        }

        // --- Fungsi Logika Peta ---
        function handleFindHospitalsClick() {
          const mapStatus = document.getElementById("map-status");
          const findHospitalsBtn =
            document.getElementById("find-hospitals-btn");

          mapStatus.textContent = "Meminta izin lokasi...";
          mapStatus.classList.remove("hidden");
          findHospitalsBtn.disabled = true;

          if (!navigator.geolocation) {
            mapStatus.textContent =
              "Geolocation tidak didukung oleh browser ini.";
            findHospitalsBtn.disabled = false;
            return;
          }
          navigator.geolocation.getCurrentPosition(
            handleLocationSuccess,
            handleLocationError
          );
        }

        function handleLocationSuccess(position) {
          const { latitude, longitude } = position.coords;
          const mapStatus = document.getElementById("map-status");
          mapStatus.textContent =
            "Lokasi ditemukan. Mencari fasilitas kesehatan...";

          if (map === null) {
            map = L.map("map").setView([latitude, longitude], 13);
            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
              attribution:
                '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
            }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
          } else {
            map.setView([latitude, longitude], 13);
            markersLayer.clearLayers();
          }

          L.marker([latitude, longitude])
            .addTo(markersLayer)
            .bindPopup("<b>Anda di sini</b>")
            .openPopup();
          findNearbyHospitals(latitude, longitude);
        }

        function handleLocationError(error) {
          const mapStatus = document.getElementById("map-status");
          mapStatus.textContent = `Gagal mendapatkan lokasi otomatis: ${error.message}. Menggunakan lokasi default (Jakarta).`;
          
          // Fallback ke koordinat pusat Jakarta
          const defaultLat = -6.200000;
          const defaultLon = 106.816666;

          if (map === null) {
            map = L.map("map").setView([defaultLat, defaultLon], 13);
            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
              attribution:
                '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
            }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
          } else {
            map.setView([defaultLat, defaultLon], 13);
            markersLayer.clearLayers();
          }

          L.marker([defaultLat, defaultLon])
            .addTo(markersLayer)
            .bindPopup("<b>Lokasi Default (Jakarta)</b>")
            .openPopup();
            
          findNearbyHospitals(defaultLat, defaultLon);
        }

        async function findNearbyHospitals(lat, lon) {
          const mapStatus = document.getElementById("map-status");
          mapStatus.textContent = "Sedang mencari fasilitas kesehatan terdekat di sistem... (Mohon tunggu, ini bisa memakan waktu beberapa detik)";
          mapStatus.classList.remove("hidden");

          const radius = 5000;
          const query = `[out:json];(node["amenity"~"hospital|clinic|doctors"](around:${radius},${lat},${lon});way["amenity"~"hospital|clinic|doctors"](around:${radius},${lat},${lon}););out center;`;
          const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(
            query
          )}`;

          // Ikon khusus warna merah untuk Rumah Sakit/Klinik
          const hospitalIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
          });

          try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.elements.length === 0) {
              mapStatus.textContent =
                "Tidak ada faskes ditemukan dalam radius 5 km dari lokasi ini di sistem peta.";
            } else {
              mapStatus.textContent = `Berhasil menemukan ${data.elements.length} fasilitas kesehatan di sekitar lokasi.`;
              data.elements.forEach((el) => {
                const name = el.tags?.name || "Fasilitas Kesehatan";
                let center =
                  el.type === "node"
                    ? [el.lat, el.lon]
                    : [el.center.lat, el.center.lon];
                if (center)
                  L.marker(center, { icon: hospitalIcon })
                    .addTo(markersLayer)
                    .bindPopup(`<b>🏥 ${name}</b>`);
              });
            }
          } catch (error) {
            mapStatus.textContent = `Error saat mencari faskes: ${error.message}`;
          } finally {
            document.getElementById("find-hospitals-btn").disabled = false;
          }
        }
      });
    </script>
  </body>
</html>
